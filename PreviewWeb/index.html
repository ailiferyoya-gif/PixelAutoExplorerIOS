<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#223b43">
    <title>Pixel Auto Explorer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Pixel Auto Explorer web preview">
      <canvas id="game" aria-label="Autonomous pixel exploration field"></canvas>
      <section class="hud hud-left" aria-label="Exploration status">
        <h1>PIXEL AUTO EXPLORER</h1>
        <p id="workers">WOODCUTTERS 0 / SUMMONS 0</p>
        <p id="status">STATUS TAP SUMMON</p>
        <p id="field">FIELD 7680px / NODES 145</p>
        <ul id="inventory" aria-label="Material inventory"></ul>
      </section>
      <section class="hud hud-right" aria-label="Controls">
        <button id="pause" type="button">PAUSE</button>
        <button id="reset" type="button">RESET</button>
      </section>
      <div class="minimap" aria-hidden="true">
        <span id="miniExplorer"></span>
        <span id="miniTarget"></span>
      </div>
      <button id="summon" class="summon" type="button">SUMMON</button>
    </main>
    <script src="app.js?v=woodcutter-actions-20260706"></script>
  </body>
</html>
