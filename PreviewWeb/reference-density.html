<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#223b43">
    <title>ドット自動冒険</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="ドット自動冒険 Web プレビュー">
      <canvas id="game" aria-label="自動で探索する広大なドットフィールド"></canvas>
      <section class="hud hud-left" aria-label="探索状況">
        <h1>ドット自動冒険</h1>
        <p id="workers">仲間 0 / 召喚 0</p>
        <p id="status">状態 召喚待ち</p>
        <p id="field">フィールド 11200px / 素材 210</p>
        <ul id="inventory" aria-label="素材インベントリ"></ul>
      </section>
      <section class="hud hud-right" aria-label="操作">
        <button id="pause" type="button">停止</button>
        <button id="reset" type="button">リセット</button>
      </section>
      <div class="minimap" aria-hidden="true">
        <span id="miniExplorer"></span>
        <span id="miniTarget"></span>
      </div>
      <div class="rolebar" aria-label="召喚する仲間">
        <button class="role active" data-role="woodcutter" type="button">木こり</button>
        <button class="role" data-role="digger" type="button">掘り師</button>
        <button class="role" data-role="adventurer" type="button">冒険者</button>
      </div>
      <button id="summon" class="summon" type="button">召喚</button>
    </main>
    <script src="app.js?v=roles-ja-scale-20260706"></script>
  </body>
</html>
